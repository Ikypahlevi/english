<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EngMaster – Học từ vựng tiếng Anh</title>
    <meta name="description" content="Ứng dụng học từ vựng tiếng Anh thông minh với AI, Flashcards và Kiểm tra trắc nghiệm." />

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
            colors: {
              brand: {
                50: '#f0f4f8', 100: '#d9e2ec', 200: '#bcccdc',
                300: '#9fb3c8', 400: '#829ab1', 500: '#627d98',
                600: '#486581', 700: '#334e68', 800: '#243b53', 900: '#102a43', // Deep Navy / Slate
              },
            },
            animation: {
              'fade-in': 'fadeIn 0.4s ease-out',
              'slide-up': 'slideUp 0.4s cubic-bezier(.16,1,.3,1) forwards',
              'slide-down': 'slideDown 0.4s cubic-bezier(.16,1,.3,1) forwards',
              'slide-in-left': 'slideInLeft 0.4s cubic-bezier(.16,1,.3,1) forwards',
              'scale-in': 'scaleIn 0.3s cubic-bezier(.16,1,.3,1) forwards',
              'float': 'float 4s ease-in-out infinite',
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'shine': 'shine 3s linear infinite',
              'glow-pulse': 'glowPulse 2s infinite',
              'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
              'bounce-soft': 'bounceSoft 2s infinite',
              'slide-up-banner': 'slideUpBanner 0.4s cubic-bezier(.16,1,.3,1) forwards',
            },
            keyframes: {
              fadeIn: { from: { opacity: '0' }, to: { opacity: '1' } },
              slideUp: { from: { opacity: '0', transform: 'translateY(20px)' }, to: { opacity: '1', transform: 'translateY(0)' } },
              slideDown: { from: { opacity: '0', transform: 'translateY(-20px)' }, to: { opacity: '1', transform: 'translateY(0)' } },
              slideInLeft: { from: { opacity: '0', transform: 'translateX(-20px)' }, to: { opacity: '1', transform: 'translateX(0)' } },
              scaleIn: { from: { opacity: '0', transform: 'scale(0.9)' }, to: { opacity: '1', transform: 'scale(1)' } },
              float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-6px)' } },
              shine: { '0%': { backgroundPosition: '200% center' }, '100%': { backgroundPosition: '-200% center' } },
              glowPulse: { '0%, 100%': { boxShadow: '0 0 15px rgba(99, 102, 241, 0.4)' }, '50%': { boxShadow: '0 0 30px rgba(99, 102, 241, 0.8)' } },
              shake: { '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' }, '20%, 80%': { transform: 'translate3d(2px, 0, 0)' }, '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' }, '40%, 60%': { transform: 'translate3d(4px, 0, 0)' } },
              bounceSoft: { '0%, 100%': { transform: 'translateY(-5%)', animationTimingFunction: 'cubic-bezier(0.8,0,1,1)' }, '50%': { transform: 'none', animationTimingFunction: 'cubic-bezier(0,0,0.2,1)' } },
              slideUpBanner: { from: { opacity: '0', transform: 'translateY(100%)' }, to: { opacity: '1', transform: 'translateY(0)' } },
            },
          }
        }
      }
    </script>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }
      .dark ::-webkit-scrollbar-thumb { background: #334155; }
      .flip-card { perspective: 1200px; }
      .flip-inner { transition: transform 0.6s cubic-bezier(.4,0,.2,1); transform-style: preserve-3d; position: relative; width: 100%; height: 100%; }
      .flip-inner.flipped { transform: rotateY(180deg); }
      .flip-front, .flip-back { position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; }
      .flip-back { transform: rotateY(180deg); }
      .drag-active { border-color: #6366f1 !important; background: #eef2ff !important; transform: scale(1.02); }
      .dark .drag-active { background: #1e1b4b !important; }
      .nav-item { transition: all 0.3s cubic-bezier(.4,0,.2,1); border-radius: 12px; position: relative; overflow: hidden; }
      .nav-item::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); transition: all 0.5s ease; }
      .nav-item:hover::before { left: 100%; }
      .nav-item:hover:not(.nav-active) { background: rgba(99,102,241,0.08); transform: translateY(-1px); }
      .nav-item.nav-active { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white !important; box-shadow: 0 8px 20px rgba(99,102,241,0.4); transform: translateY(-2px); }
      .dark .nav-item:hover:not(.nav-active) { background: rgba(99,102,241,0.15); }
      
      .topic-card { transition: all 0.3s cubic-bezier(.4,0,.2,1); border: 1px solid rgba(0,0,0,0.05); }
      .topic-card:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 20px 40px rgba(99,102,241,0.15); border-color: rgba(99,102,241,0.3); }
      .dark .topic-card:hover { box-shadow: 0 20px 40px rgba(99,102,241,0.3); border-color: rgba(99,102,241,0.5); }
      
      .vip-btn { position: relative; overflow: hidden; z-index: 1; transition: all 0.3s ease; }
      .vip-btn::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); transition: all 0.4s ease; z-index: -1; }
      .vip-btn:hover::after { left: 100%; }
      .vip-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(99,102,241,0.4); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
