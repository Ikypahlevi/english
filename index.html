<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EngMaster – Học từ vựng tiếng Anh</title>
    <meta name="description" content="Ứng dụng học từ vựng tiếng Anh thông minh với AI, Flashcards và Kiểm tra trắc nghiệm." />

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
            colors: {
              brand: {
                50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe',
                300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1',
                600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81',
              },
            },
            animation: {
              'fade-in': 'fadeIn 0.3s ease-out',
              'slide-up': 'slideUp 0.35s cubic-bezier(.16,1,.3,1)',
              'slide-in-left': 'slideInLeft 0.3s cubic-bezier(.16,1,.3,1)',
              'scale-in': 'scaleIn 0.25s cubic-bezier(.16,1,.3,1)',
              'float': 'float 3s ease-in-out infinite',
            },
            keyframes: {
              fadeIn: { from: { opacity: '0' }, to: { opacity: '1' } },
              slideUp: { from: { opacity: '0', transform: 'translateY(16px)' }, to: { opacity: '1', transform: 'translateY(0)' } },
              slideInLeft: { from: { opacity: '0', transform: 'translateX(-16px)' }, to: { opacity: '1', transform: 'translateX(0)' } },
              scaleIn: { from: { opacity: '0', transform: 'scale(0.95)' }, to: { opacity: '1', transform: 'scale(1)' } },
              float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-8px)' } },
            },
          }
        }
      }
    </script>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }
      .dark ::-webkit-scrollbar-thumb { background: #334155; }
      .flip-card { perspective: 1200px; }
      .flip-inner { transition: transform 0.6s cubic-bezier(.4,0,.2,1); transform-style: preserve-3d; position: relative; width: 100%; height: 100%; }
      .flip-inner.flipped { transform: rotateY(180deg); }
      .flip-front, .flip-back { position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; }
      .flip-back { transform: rotateY(180deg); }
      .drag-active { border-color: #6366f1 !important; background: #eef2ff !important; transform: scale(1.02); }
      .dark .drag-active { background: #1e1b4b !important; }
      .nav-item { transition: all 0.2s cubic-bezier(.4,0,.2,1); border-radius: 12px; }
      .nav-item:hover:not(.nav-active) { background: rgba(99,102,241,0.08); }
      .nav-item.nav-active { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white !important; box-shadow: 0 4px 14px rgba(99,102,241,0.35); }
      .dark .nav-item:hover:not(.nav-active) { background: rgba(99,102,241,0.15); }
      .topic-card { transition: all 0.25s cubic-bezier(.4,0,.2,1); }
      .topic-card:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,0.1); }
      .dark .topic-card:hover { box-shadow: 0 12px 32px rgba(0,0,0,0.4); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
